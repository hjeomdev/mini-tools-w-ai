<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>유니코드 변환기</title>
  <style>
    :root {
      --bg:         #0d1117;
      --surface:    #161b22;
      --surface2:   #1c2128;
      --border:     #30363d;
      --text:       #c9d1d9;
      --text-muted: #8b949e;
      --accent:     #58a6ff;
      --green:      #3fb950;
      --orange:     #d29922;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    header h1 { font-size: 16px; font-weight: 700; }
    .header-sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 1px;
    }
    .spacer { flex: 1; }

    .btn {
      padding: 5px 14px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      transition: background .15s, border-color .15s;
    }
    .btn:hover { background: #2d333b; border-color: #8b949e; }
    .btn.ghost {
      background: transparent;
      border-color: transparent;
      color: var(--text-muted);
    }
    .btn.ghost:hover { background: var(--surface2); border-color: var(--border); color: var(--text); }
    .btn.icon { padding: 5px 9px; font-size: 14px; }

    /* ── Format bar ─────────────────────── */
    .format-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .format-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--text-muted);
      margin-right: 2px;
    }

    .seg {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }
    .seg-btn {
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      background: transparent;
      color: var(--text-muted);
      border: none;
      border-right: 1px solid var(--border);
      transition: background .12s, color .12s;
      white-space: nowrap;
    }
    .seg-btn:last-child { border-right: none; }
    .seg-btn.active { background: var(--accent); color: #fff; }
    .seg-btn:not(.active):hover { background: var(--surface2); color: var(--text); }

    .sep-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--text-muted);
      margin-left: 12px;
      margin-right: 2px;
    }

    /* ── Stats bar ─────────────────────── */
    .stats-bar {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 7px 20px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-muted);
      background: var(--surface);
      flex-shrink: 0;
    }
    .stat-item { display: flex; align-items: center; gap: 6px; }
    .stat-pill {
      background: #21262d;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1px 9px;
      font-size: 11px;
      font-weight: 600;
    }
    .stat-pill.lang-ko { border-color: #388bfd; color: #79c0ff; }
    .stat-pill.lang-ja { border-color: #e3b341; color: #e3b341; }
    .stat-pill.lang-zh { border-color: #f78166; color: #f78166; }
    .stat-pill.lang-en { border-color: #56d364; color: #56d364; }
    .stat-pill.lang-code { border-color: var(--text-muted); color: var(--text-muted); }

    .detect-arrow {
      color: var(--text-muted);
      font-size: 13px;
    }

    /* ── Input section ───────────────────── */
    .input-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }
    .input-panel {
      display: flex;
      flex-direction: column;
      padding: 14px 16px;
    }
    .input-panel:first-child { border-right: 1px solid var(--border); }

    .input-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .input-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--text-muted);
    }
    .char-count {
      font-size: 11px;
      color: var(--text-muted);
      margin-left: auto;
    }

    textarea {
      width: 100%;
      height: 200px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'SFMono-Regular', 'Consolas', 'Liberation Mono', monospace;
      font-size: 13px;
      line-height: 1.6;
      padding: 10px 12px;
      resize: vertical;
      outline: none;
      tab-size: 2;
    }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--text-muted); }

    /* ── Table section ───────────────────── */
    .table-section {
      flex: 1;
      overflow: auto;
    }

    .table-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 160px;
      gap: 8px;
      color: var(--text-muted);
      font-size: 14px;
    }
    .table-empty svg { opacity: .3; }

    .conv-table {
      width: 100%;
      border-collapse: collapse;
      font-family: 'SFMono-Regular', 'Consolas', 'Liberation Mono', monospace;
      font-size: 12.5px;
    }
    .conv-table thead th {
      padding: 8px 16px;
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--text-muted);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
    }
    .conv-table tbody tr { border-bottom: 1px solid #21262d; }
    .conv-table tbody tr:hover { background: #161b22; }
    .conv-table tbody td {
      padding: 6px 16px;
      vertical-align: middle;
    }

    .cell-char {
      font-size: 18px;
      text-align: center;
      width: 60px;
    }
    .cell-name {
      color: var(--text-muted);
      font-size: 11px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .cell-dec { color: #79c0ff; }
    .cell-hex { color: #ffa657; }
    .cell-uni { color: #d2a8ff; }
    .cell-html { color: #7ee787; }
    .cell-bin { color: var(--text-muted); font-size: 11px; letter-spacing: .5px; }

    .lang-badge {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
      font-family: -apple-system, sans-serif;
    }
    .lb-ko { background: #1c2a3f; color: #79c0ff; }
    .lb-ja { background: #2d2a12; color: #e3b341; }
    .lb-zh { background: #2d1a14; color: #f78166; }
    .lb-en { background: #122d20; color: #56d364; }
    .lb-sym { background: #21262d; color: #8b949e; }

    /* ── Scrollbar ───────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #484f58; }
  </style>
</head>
<body>

<!-- ── Header ────────────────────────────── -->
<header>
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M10 20l4-16M4 9h16M4 15h16"/>
  </svg>
  <div>
    <h1>유니코드 변환기</h1>
    <div class="header-sub">한국어 · 영문 · 일본어 · 중국어 ↔ 코드포인트 (ASCII 호환)</div>
  </div>
  <div class="spacer"></div>
  <button class="btn" id="btnSwap" title="텍스트 ↔ 코드 교체">↕ 교체</button>
  <button class="btn" id="btnClear">전체 지우기</button>
</header>

<!-- ── Format bar ─────────────────────────── -->
<div class="format-bar">
  <span class="format-label">코드 형식</span>
  <div class="seg" id="fmtSeg">
    <button class="seg-btn active" data-fmt="dec">10진수</button>
    <button class="seg-btn" data-fmt="hex">16진수 (0x)</button>
    <button class="seg-btn" data-fmt="uni">U+ 표기</button>
    <button class="seg-btn" data-fmt="html-dec">HTML (&amp;#;)</button>
    <button class="seg-btn" data-fmt="html-hex">HTML hex</button>
    <button class="seg-btn" data-fmt="bin">2진수</button>
  </div>
  <span class="sep-label">구분자</span>
  <div class="seg" id="sepSeg">
    <button class="seg-btn active" data-sep=" ">공백</button>
    <button class="seg-btn" data-sep=",">쉼표</button>
    <button class="seg-btn" data-sep="\n">줄바꿈</button>
  </div>
</div>

<!-- ── Stats bar ──────────────────────────── -->
<div class="stats-bar">
  <div class="stat-item">
    <span>감지:</span>
    <span id="detectBadge" class="stat-pill lang-code">—</span>
  </div>
  <div class="stat-item">
    <span>문자 수:</span>
    <strong id="charCountStat">0</strong>
  </div>
  <div class="stat-item">
    <span>코드 수:</span>
    <strong id="codeCountStat">0</strong>
  </div>
  <div class="spacer"></div>
  <button class="btn icon" id="btnCopyText" title="텍스트 복사">📋 텍스트</button>
  <button class="btn icon" id="btnCopyCode" title="코드 복사">📋 코드</button>
</div>

<!-- ── Input section ──────────────────────── -->
<div class="input-section">
  <div class="input-panel">
    <div class="input-header">
      <span class="input-label">텍스트</span>
      <span class="char-count" id="txtCount">0자</span>
    </div>
    <textarea id="inputText"
      placeholder="한국어, 영문, 日本語, 中文 등 텍스트를 입력하세요…"
      spellcheck="false"></textarea>
  </div>
  <div class="input-panel">
    <div class="input-header">
      <span class="input-label">코드포인트</span>
      <span class="char-count" id="codeCount">0개</span>
    </div>
    <textarea id="inputCode"
      placeholder="코드를 입력하면 텍스트로 변환됩니다&#10;예) 44032 50612 54620 (10진수)&#10;예) 0xAC00 0xC5B0 0xD654 (16진수)&#10;예) U+AC00 U+C5B0 U+D654 (U+ 표기)"
      spellcheck="false"></textarea>
  </div>
</div>

<!-- ── Detail table ────────────────────────── -->
<div class="table-section">
  <div class="table-empty" id="tableEmpty">
    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M10 20l4-16M4 9h16M4 15h16"/>
    </svg>
    <span>텍스트를 입력하면 문자별 코드를 확인할 수 있습니다</span>
  </div>
  <div id="tableOutput"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  State
// ═══════════════════════════════════════════════════════════════
let fmt = 'dec';
let sep = ' ';
let lastSide = null; // 'text' | 'code'
let renderTimer = null;

// ═══════════════════════════════════════════════════════════════
//  Language detection
// ═══════════════════════════════════════════════════════════════
function detectLangs(text) {
  const langs = [];
  if (/[\uAC00-\uD7A3\u1100-\u11FF\u3130-\u318F\uA960-\uA97F\uD7B0-\uD7FF]/.test(text)) langs.push('ko');
  if (/[\u3040-\u309F\u30A0-\u30FF\u31F0-\u31FF\uFF65-\uFF9F]/.test(text)) langs.push('ja');
  if (/[\u4E00-\u9FFF\u3400-\u4DBF\uF900-\uFAFF\u{20000}-\u{2A6DF}]/u.test(text)) langs.push('zh');
  if (/[a-zA-Z]/.test(text)) langs.push('en');
  return langs;
}

const LANG_LABELS = { ko:'한국어', ja:'일본어', zh:'중국어', en:'영문' };
const LANG_CLS    = { ko:'lb-ko', ja:'lb-ja', zh:'lb-zh', en:'lb-en' };

function charLang(cp) {
  if ((cp >= 0xAC00 && cp <= 0xD7A3) || (cp >= 0x1100 && cp <= 0x11FF) || (cp >= 0x3130 && cp <= 0x318F)) return 'ko';
  if ((cp >= 0x3040 && cp <= 0x309F) || (cp >= 0x30A0 && cp <= 0x30FF)) return 'ja';
  if ((cp >= 0x4E00 && cp <= 0x9FFF) || (cp >= 0x3400 && cp <= 0x4DBF) || (cp >= 0xF900 && cp <= 0xFAFF)) return 'zh';
  if ((cp >= 0x41 && cp <= 0x5A) || (cp >= 0x61 && cp <= 0x7A)) return 'en';
  return 'sym';
}

// ═══════════════════════════════════════════════════════════════
//  Input type detection (text vs code)
// ═══════════════════════════════════════════════════════════════
function looksLikeCode(s) {
  const t = s.trim();
  if (!t) return false;
  if (/U\+[0-9A-Fa-f]{1,6}/.test(t)) return true;
  if (/0x[0-9A-Fa-f]+/i.test(t)) return true;
  if (/&#x[0-9A-Fa-f]+;/i.test(t)) return true;
  if (/&#\d+;/.test(t)) return true;
  // Pure space/comma-separated integers (only ASCII digits/whitespace/comma)
  if (/^[\d\s,]+$/.test(t) && /\d{2,}/.test(t)) return true;
  // Binary: sequences of 0s and 1s separated by spaces
  if (/^[01\s,]+$/.test(t) && /[01]{4,}/.test(t)) return true;
  return false;
}

// ═══════════════════════════════════════════════════════════════
//  Encoding: text → codes
// ═══════════════════════════════════════════════════════════════
function encodeChar(cp, f) {
  switch (f) {
    case 'dec':      return cp.toString(10);
    case 'hex':      return '0x' + cp.toString(16).toUpperCase();
    case 'uni':      return 'U+' + cp.toString(16).toUpperCase().padStart(4, '0');
    case 'html-dec': return '&#' + cp + ';';
    case 'html-hex': return '&#x' + cp.toString(16).toUpperCase() + ';';
    case 'bin':      return cp.toString(2).padStart(cp > 0xFFFF ? 21 : cp > 0xFF ? 16 : 8, '0');
    default:         return cp.toString();
  }
}

function textToCode(text, f, s) {
  if (!text) return '';
  const actualSep = s === '\\n' ? '\n' : s;
  return [...text].map(ch => encodeChar(ch.codePointAt(0), f)).join(actualSep);
}

// ═══════════════════════════════════════════════════════════════
//  Decoding: codes → text
// ═══════════════════════════════════════════════════════════════
function parseCodePoints(raw) {
  const t = raw.trim();
  if (!t) return [];

  // U+XXXX
  if (/U\+[0-9A-Fa-f]/i.test(t)) {
    return (t.match(/U\+([0-9A-Fa-f]{1,6})/gi) || [])
      .map(m => parseInt(m.slice(2), 16));
  }
  // 0xXXXX
  if (/0x[0-9A-Fa-f]/i.test(t)) {
    return (t.match(/0x([0-9A-Fa-f]+)/gi) || [])
      .map(m => parseInt(m, 16));
  }
  // HTML hex &#xXX;
  if (/&#x[0-9A-Fa-f]+;/i.test(t)) {
    return (t.match(/&#x([0-9A-Fa-f]+);/gi) || [])
      .map(m => parseInt(m.match(/&#x([0-9A-Fa-f]+);/i)[1], 16));
  }
  // HTML dec &#NN;
  if (/&#\d+;/.test(t)) {
    return (t.match(/&#(\d+);/g) || [])
      .map(m => parseInt(m.match(/&#(\d+);/)[1]));
  }
  // Binary: tokens of only 0/1 with length ≥ 4
  if (/^[01\s,]+$/.test(t)) {
    const tokens = t.split(/[\s,]+/).filter(s => s && /^[01]+$/.test(s) && s.length >= 4);
    if (tokens.length) return tokens.map(s => parseInt(s, 2));
  }
  // Decimal integers
  const tokens = t.split(/[\s,]+/).filter(s => /^\d+$/.test(s));
  return tokens.map(s => parseInt(s, 10));
}

function codeToText(raw) {
  const cps = parseCodePoints(raw);
  if (!cps.length) return '';
  try {
    return cps
      .filter(cp => cp >= 0 && cp <= 0x10FFFF)
      .map(cp => String.fromCodePoint(cp))
      .join('');
  } catch { return ''; }
}

// ═══════════════════════════════════════════════════════════════
//  Unicode character name (partial lookup)
// ═══════════════════════════════════════════════════════════════
function charDesc(cp) {
  if (cp < 32)  return ['제어 문자', '[C0]'];
  if (cp === 32) return ['공백', 'SPACE'];
  if (cp >= 33  && cp <= 126)  return ['ASCII', 'BASIC LATIN'];
  if (cp >= 0xAC00 && cp <= 0xD7A3) return ['한글', '한글 음절'];
  if (cp >= 0x1100 && cp <= 0x11FF) return ['한글', '한글 자모'];
  if (cp >= 0x3130 && cp <= 0x318F) return ['한글', '한글 호환 자모'];
  if (cp >= 0x3040 && cp <= 0x309F) return ['일본어', '히라가나'];
  if (cp >= 0x30A0 && cp <= 0x30FF) return ['일본어', '가타카나'];
  if (cp >= 0x4E00 && cp <= 0x9FFF) return ['중국어', 'CJK 통합 한자'];
  if (cp >= 0x3400 && cp <= 0x4DBF) return ['중국어', 'CJK 확장 A'];
  if (cp >= 0xF900 && cp <= 0xFAFF) return ['중국어', 'CJK 호환 한자'];
  if (cp >= 0x0080 && cp <= 0x00FF) return ['라틴', 'Latin-1 Supplement'];
  if (cp >= 0x2000 && cp <= 0x206F) return ['기호', 'General Punctuation'];
  if (cp >= 0x2600 && cp <= 0x26FF) return ['기호', 'Misc. Symbols'];
  if (cp >= 0x1F600 && cp <= 0x1F64F) return ['이모지', 'Emoticons'];
  if (cp >= 0x1F300 && cp <= 0x1FFFF) return ['이모지', 'Emoji'];
  return ['기타', 'Other'];
}

// ═══════════════════════════════════════════════════════════════
//  Render
// ═══════════════════════════════════════════════════════════════
function render() {
  const textEl = document.getElementById('inputText');
  const codeEl = document.getElementById('inputCode');
  const text = textEl.value;
  const code = codeEl.value;

  // Derive current text and code values based on which side was last edited
  let currentText = text;
  let currentCode = code;

  if (lastSide === 'text') {
    currentCode = textToCode(text, fmt, sep);
    codeEl.value = currentCode;
  } else if (lastSide === 'code') {
    currentText = codeToText(code);
    textEl.value = currentText;
    currentCode = code;
  }

  // Char counts
  const chars = [...currentText];
  document.getElementById('txtCount').textContent  = chars.length + '자';
  document.getElementById('codeCount').textContent = (parseCodePoints(currentCode).length) + '개';
  document.getElementById('charCountStat').textContent = chars.length;
  document.getElementById('codeCountStat').textContent = parseCodePoints(currentCode).length;

  // Detection badge
  const detectEl = document.getElementById('detectBadge');
  if (!currentText && !currentCode) {
    detectEl.textContent = '—';
    detectEl.className = 'stat-pill lang-code';
  } else if (lastSide === 'code') {
    detectEl.textContent = '코드 → 텍스트';
    detectEl.className = 'stat-pill lang-code';
  } else {
    const langs = detectLangs(currentText);
    if (langs.length === 0) {
      detectEl.textContent = '기타 → 코드';
      detectEl.className = 'stat-pill lang-code';
    } else {
      const firstLang = langs[0];
      detectEl.textContent = LANG_LABELS[firstLang]
        + (langs.length > 1 ? ' 등' : '')
        + ' → 코드';
      detectEl.className = 'stat-pill lang-' + firstLang;
    }
  }

  // Table
  renderTable(chars, currentText);
}

function renderTable(chars, text) {
  const emptyEl  = document.getElementById('tableEmpty');
  const outputEl = document.getElementById('tableOutput');

  if (!chars.length) {
    emptyEl.style.display = 'flex';
    outputEl.innerHTML = '';
    return;
  }
  emptyEl.style.display = 'none';

  // Column headers depend on format
  const fmtHeader = {
    'dec':      '10진수',
    'hex':      '16진수',
    'uni':      'U+ 표기',
    'html-dec': 'HTML (10진수)',
    'html-hex': 'HTML (16진수)',
    'bin':      '2진수',
  }[fmt];

  let html = `
    <table class="conv-table">
      <thead>
        <tr>
          <th style="width:60px;text-align:center">문자</th>
          <th>언어</th>
          <th>10진수</th>
          <th>16진수</th>
          <th>U+</th>
          <th>HTML</th>
          <th>2진수</th>
          <th style="font-size:10px">설명</th>
        </tr>
      </thead>
      <tbody>`;

  for (const ch of chars) {
    const cp = ch.codePointAt(0);
    const lang = charLang(cp);
    const [cat, desc] = charDesc(cp);
    const displayChar = cp < 32 ? '·' : ch;

    html += `
      <tr>
        <td class="cell-char">${displayChar}</td>
        <td><span class="lang-badge lb-${lang}">${LANG_LABELS[lang] || cat}</span></td>
        <td class="cell-dec">${cp}</td>
        <td class="cell-hex">0x${cp.toString(16).toUpperCase()}</td>
        <td class="cell-uni">U+${cp.toString(16).toUpperCase().padStart(4,'0')}</td>
        <td class="cell-html">&#${cp};</td>
        <td class="cell-bin">${cp.toString(2).padStart(cp > 0xFFFF ? 21 : cp > 0xFF ? 16 : 8, '0')}</td>
        <td class="cell-name">${desc}</td>
      </tr>`;
  }

  html += '</tbody></table>';
  outputEl.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════
//  Auto-detect on manual code input
// ═══════════════════════════════════════════════════════════════
function scheduleRender() {
  clearTimeout(renderTimer);
  renderTimer = setTimeout(render, 60);
}

// ═══════════════════════════════════════════════════════════════
//  Event binding
// ═══════════════════════════════════════════════════════════════
document.getElementById('inputText').addEventListener('input', () => {
  lastSide = 'text';
  scheduleRender();
});

document.getElementById('inputCode').addEventListener('input', () => {
  lastSide = 'code';
  scheduleRender();
});

// Format buttons
document.getElementById('fmtSeg').addEventListener('click', e => {
  const btn = e.target.closest('.seg-btn');
  if (!btn) return;
  document.querySelectorAll('#fmtSeg .seg-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  fmt = btn.dataset.fmt;
  if (lastSide !== 'code') lastSide = 'text';
  render();
});

// Separator buttons
document.getElementById('sepSeg').addEventListener('click', e => {
  const btn = e.target.closest('.seg-btn');
  if (!btn) return;
  document.querySelectorAll('#sepSeg .seg-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  sep = btn.dataset.sep;
  if (lastSide !== 'code') lastSide = 'text';
  render();
});

// Copy buttons
document.getElementById('btnCopyText').addEventListener('click', () => {
  const t = document.getElementById('inputText').value;
  if (!t) return;
  navigator.clipboard.writeText(t).then(() => flashBtn('btnCopyText', '✓ 복사됨'));
});
document.getElementById('btnCopyCode').addEventListener('click', () => {
  const t = document.getElementById('inputCode').value;
  if (!t) return;
  navigator.clipboard.writeText(t).then(() => flashBtn('btnCopyCode', '✓ 복사됨'));
});

function flashBtn(id, label) {
  const btn = document.getElementById(id);
  const orig = btn.textContent;
  btn.textContent = label;
  btn.style.color = '#56d364';
  setTimeout(() => { btn.textContent = orig; btn.style.color = ''; }, 1500);
}

// Swap
document.getElementById('btnSwap').addEventListener('click', () => {
  const ta = document.getElementById('inputText');
  const tc = document.getElementById('inputCode');
  const tmp = ta.value;
  ta.value = tc.value;
  tc.value = tmp;
  lastSide = looksLikeCode(ta.value) ? 'code' : 'text';
  // If text area now has code, flip
  if (looksLikeCode(ta.value)) {
    const decoded = codeToText(ta.value);
    tc.value = ta.value;
    ta.value = decoded;
    lastSide = 'code';
  }
  render();
});

// Clear
document.getElementById('btnClear').addEventListener('click', () => {
  document.getElementById('inputText').value = '';
  document.getElementById('inputCode').value = '';
  lastSide = null;
  render();
});

// ═══════════════════════════════════════════════════════════════
//  Init
// ═══════════════════════════════════════════════════════════════
render();
</script>
</body>
</html>
