<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCP/IP 전문 파서</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #f2f1ed;
  --surface:     #ffffff;
  --surface2:    #f8f7f4;
  --surface3:    #eeedea;
  --sidebar-bg:  #1e1e1c;
  --border:      #e2e0d8;
  --border2:     #c8c5bb;
  --text:        #1a1917;
  --text2:       #6b6860;
  --text3:       #9b9890;
  --accent:      #1a1917;
  --accent-fg:   #ffffff;
  --info-bg:     #eef4ff;
  --info-text:   #1a4fa0;
  --info-border: #b8d0f8;
  --warn-bg:     #fff8e6;
  --warn-text:   #7a4f00;
  --warn-border: #f0c060;
  --ok-bg:       #edfaf3;
  --ok-text:     #0f6640;
  --ok-border:   #6ed4a0;
  --danger-bg:   #fff0f0;
  --danger-text: #b02020;
  --danger-border:#f0b0b0;
  --space-bg:    #e8f0ff;
  --space-fg:    #6080c0;
  --mono: 'Courier New', monospace;
  --sans: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  --radius: 10px;
  --radius-sm: 6px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg:          #111110;
    --surface:     #1c1c1a;
    --surface2:    #242422;
    --surface3:    #2a2a27;
    --sidebar-bg:  #0d0d0c;
    --border:      #2e2e2b;
    --border2:     #484844;
    --text:        #f0ede8;
    --text2:       #8a8880;
    --text3:       #5a5855;
    --accent:      #f0ede8;
    --accent-fg:   #111110;
    --info-bg:     #0e1e38;
    --info-text:   #7ab0f0;
    --info-border: #1a4080;
    --warn-bg:     #2a2000;
    --warn-text:   #f5c842;
    --warn-border: #806000;
    --ok-bg:       #0a2118;
    --ok-text:     #4dd48a;
    --ok-border:   #1a6040;
    --danger-bg:   #2a0a0a;
    --danger-text: #e06060;
    --danger-border:#802020;
    --space-bg:    #1a2040;
    --space-fg:    #6090e0;
  }
}

html, body { height: 100%; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  display: flex; flex-direction: column;
  height: 100vh; overflow: hidden;
}

/* ── Layout ── */
.app { display: flex; flex: 1; min-height: 0; overflow: hidden; }

/* ── Sidebar ── */
.sidebar {
  width: 220px; min-width: 140px; max-width: 420px;
  background: var(--sidebar-bg);
  display: flex; flex-direction: column;
  flex-shrink: 0; overflow: hidden; position: relative;
  user-select: none;
}
.sidebar-header { padding: 14px 14px 10px; border-bottom: 1px solid rgba(255,255,255,0.07); flex-shrink: 0; }
.sidebar-title  { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.85); letter-spacing: -0.01em; margin-bottom: 2px; }
.sidebar-sub    { font-size: 11px; color: rgba(255,255,255,0.35); }
.sidebar-tabs   { flex: 1; overflow-y: auto; padding: 6px 0; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.12) transparent; }
.sidebar-tabs::-webkit-scrollbar { width: 4px; }
.sidebar-tabs::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }

.tab-item {
  display: flex; align-items: center; padding: 0 8px 0 12px; min-height: 40px; height: 40px;
  cursor: pointer; transition: background 0.1s; position: relative;
}
.tab-item:hover { background: rgba(255,255,255,0.07); }
.tab-item.active { background: rgba(255,255,255,0.13); }
.tab-item.active::before {
  content: ''; position: absolute; left: 0; top: 6px; bottom: 6px;
  width: 3px; background: rgba(255,255,255,0.7); border-radius: 0 2px 2px 0;
}
.tab-item-icon {
  width: 20px; height: 20px; border-radius: 4px;
  background: rgba(255,255,255,0.1);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.5);
  flex-shrink: 0; margin-right: 9px;
}
.tab-item.active .tab-item-icon { background: rgba(255,255,255,0.22); color: rgba(255,255,255,0.9); }
.tab-item-body { flex: 1; min-width: 0; }
.tab-item-label { font-size: 13px; color: rgba(255,255,255,0.65); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; line-height: 1.3; }
.tab-item.active .tab-item-label { color: rgba(255,255,255,0.92); font-weight: 500; }
.tab-item-close {
  width: 22px; height: 22px; display: flex; align-items: center; justify-content: center;
  border-radius: 4px; font-size: 15px; line-height: 1;
  color: rgba(255,255,255,0.25); background: none; border: none; padding: 0; cursor: pointer;
  flex-shrink: 0; opacity: 0; transition: opacity 0.1s, background 0.1s, color 0.1s;
}
.tab-item:hover .tab-item-close { opacity: 1; }
.tab-item-close:hover { background: rgba(255,80,80,0.25); color: #ff8080; }

/* drag handle */
.tab-drag-handle {
  width: 16px; height: 22px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-right: 2px; margin-left: -4px;
  cursor: grab; opacity: 0;
  transition: opacity 0.1s;
  color: rgba(255,255,255,0.3);
  font-size: 11px; letter-spacing: -1px; line-height: 1;
}
.tab-item:hover .tab-drag-handle { opacity: 1; }
.tab-drag-handle:active { cursor: grabbing; }

/* drag-and-drop states */
.tab-item.dragging {
  opacity: 0.4;
  background: rgba(255,255,255,0.05) !important;
}
.tab-item.drag-over-above::before {
  content: '';
  position: absolute; left: 8px; right: 8px; top: 0;
  height: 2px; background: rgba(255,255,255,0.6); border-radius: 1px;
  pointer-events: none;
}
.tab-item.drag-over-below::after {
  content: '';
  position: absolute; left: 8px; right: 8px; bottom: 0;
  height: 2px; background: rgba(255,255,255,0.6); border-radius: 1px;
  pointer-events: none;
}
.sidebar-footer { padding: 8px; border-top: 1px solid rgba(255,255,255,0.07); flex-shrink: 0; display: flex; flex-direction: column; gap: 5px; }
.sidebar-add-btn {
  width: 100%; padding: 8px; border-radius: var(--radius-sm); font-size: 13px; font-family: var(--sans);
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.6);
  cursor: pointer; transition: background 0.1s, color 0.1s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.sidebar-add-btn:hover { background: rgba(255,255,255,0.14); color: rgba(255,255,255,0.9); }
.sidebar-group-btns { display: flex; gap: 5px; }
.sidebar-group-btn {
  flex: 1; padding: 5px 4px; border-radius: var(--radius-sm); font-size: 11px; font-family: var(--sans);
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); color: rgba(255,255,255,0.4);
  cursor: pointer; transition: background 0.1s, color 0.1s;
  display: flex; align-items: center; justify-content: center; gap: 4px; white-space: nowrap;
}
.sidebar-group-btn:hover { background: rgba(255,255,255,0.11); color: rgba(255,255,255,0.75); }
.resize-handle { position: absolute; right: 0; top: 0; bottom: 0; width: 5px; cursor: col-resize; z-index: 10; }
.resize-handle:hover, .resize-handle.dragging { background: rgba(255,255,255,0.15); }

/* ── Context menu ── */
.ctx-menu {
  position: fixed; background: var(--surface); border: 1px solid var(--border2);
  border-radius: var(--radius-sm); box-shadow: 0 4px 16px rgba(0,0,0,0.18);
  z-index: 500; min-width: 180px; padding: 4px 0; font-size: 13px;
}
.ctx-item { padding: 7px 14px; cursor: pointer; color: var(--text); display: flex; align-items: center; gap: 8px; }
.ctx-item:hover { background: var(--surface2); }
.ctx-item.danger { color: var(--danger-text); }
.ctx-item.danger:hover { background: var(--danger-bg); }
.ctx-sep { height: 1px; background: var(--border); margin: 4px 0; }

/* ── Group header in sidebar ── */
.group-header {
  display: flex; align-items: center;
  padding: 0 8px 0 10px; height: 28px;
  cursor: pointer; user-select: none; position: relative;
  transition: background 0.1s;
}
.group-header:hover { background: rgba(255,255,255,0.05); }
.group-header-chevron {
  font-size: 9px; color: rgba(255,255,255,0.35); margin-right: 5px; flex-shrink: 0;
  transition: transform 0.18s; display: inline-block;
}
.group-header.collapsed .group-header-chevron { transform: rotate(-90deg); }
.group-header-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-right: 7px; }
.group-header-label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
  color: rgba(255,255,255,0.42); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.group-header-count { font-size: 10px; color: rgba(255,255,255,0.22); margin-right: 4px; flex-shrink: 0; }
.group-header-edit {
  width: 18px; height: 18px; border-radius: 3px; border: none; background: none; padding: 0;
  color: rgba(255,255,255,0.22); font-size: 12px; cursor: pointer; opacity: 0;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: opacity 0.1s, background 0.1s;
}
.group-header:hover .group-header-edit { opacity: 1; }
.group-header-edit:hover { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); }

/* group body collapse */
.group-body { overflow: hidden; transition: max-height 0.22s ease, opacity 0.18s; }
.group-body.collapsed { max-height: 0 !important; opacity: 0; pointer-events: none; }

/* tab item group accent stripe */
.tab-item[data-group-color]::after {
  content: ''; position: absolute; right: 0; top: 8px; bottom: 8px;
  width: 3px; border-radius: 2px 0 0 2px; background: var(--gc, transparent);
}

/* drop target on group header */
.group-header.drop-target {
  background: rgba(255,255,255,0.12) !important;
  outline: 1px dashed rgba(255,255,255,0.5); outline-offset: -2px;
}

/* ── Group/color picker dialog ── */
.gpicker-bg {
  position: fixed; inset: 0; background: rgba(0,0,0,0.45);
  display: flex; align-items: center; justify-content: center; z-index: 700;
}
.gpicker-box {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: var(--radius); padding: 1.25rem 1.5rem; width: 320px;
}
.gpicker-box h3 { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
.gpicker-box label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 4px; margin-top: 10px; }
.gpicker-box input[type=text] {
  width: 100%; padding: 6px 10px; font-size: 13px; font-family: var(--sans);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--surface2); color: var(--text);
}
.gpicker-box input[type=text]:focus { outline: none; border-color: var(--border2); }
.color-swatches { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; }
.color-swatch {
  width: 30px; height: 30px; border-radius: 50%; cursor: pointer;
  border: 3px solid transparent;
  box-shadow: 0 0 0 0px rgba(255,255,255,0);
  transition: transform 0.12s, border-color 0.12s, box-shadow 0.12s;
  flex-shrink: 0; position: relative;
}
.color-swatch:hover { transform: scale(1.18); }
.color-swatch.selected {
  border-color: #fff;
  box-shadow: 0 0 0 3px rgba(255,255,255,0.35);
  transform: scale(1.22);
}
.color-swatch.selected::after {
  content: '✓'; position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.9);
  text-shadow: 0 1px 2px rgba(0,0,0,0.5); line-height: 1;
}
.gpicker-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

/* ── Main ── */
.main { flex: 1; min-width: 0; overflow-y: auto; display: flex; flex-direction: column; }
.main-inner { flex: 1; padding: 1.25rem 1.5rem 2rem; max-width: 1100px; width: 100%; }

.top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; gap: 12px; flex-wrap: wrap; }
.top-bar-left h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.02em; }
.top-bar-right { display: flex; gap: 8px; align-items: center; }

/* ── Buttons ── */
button {
  padding: 7px 14px; border-radius: var(--radius-sm); font-size: 13px; font-family: var(--sans);
  cursor: pointer; transition: opacity 0.12s, background 0.12s;
  border: 1px solid var(--border2); background: transparent; color: var(--text); white-space: nowrap;
}
button:hover { background: var(--surface2); }
.btn-primary { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); font-weight: 500; }
.btn-primary:hover { opacity: 0.82; background: var(--accent); }
.btn-danger  { border-color: var(--danger-text); color: var(--danger-text); }
.btn-danger:hover { background: var(--danger-bg); }

/* ── Tab meta ── */
.tab-meta { display: flex; gap: 10px; margin-bottom: 12px; align-items: center; flex-wrap: wrap; }
.tab-desc-input {
  flex: 1; min-width: 160px; padding: 6px 10px; font-size: 13px; font-family: var(--sans);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--surface2); color: var(--text);
}
.tab-desc-input:focus { outline: none; border-color: var(--border2); }
.tab-desc-input::placeholder { color: var(--text3); }
.enc-group { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.enc-group label { font-size: 13px; color: var(--text2); }
select {
  font-size: 13px; padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--surface); color: var(--text); cursor: pointer;
}
select:focus { outline: none; border-color: var(--border2); }
.enc-hint {
  font-size: 12px; color: var(--text3); background: var(--surface2);
  padding: 3px 10px; border-radius: 20px; border: 1px solid var(--border);
}

/* ── Input grid ── */
.input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
@media (max-width: 640px) { .input-grid { grid-template-columns: 1fr; } }
.input-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: .9rem 1rem; }
.card-label {
  font-size: 11px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase;
  color: var(--text2); margin-bottom: 7px; display: flex; align-items: center; gap: 7px;
}
.badge {
  font-size: 11px; font-weight: 500; letter-spacing: 0; text-transform: none;
  padding: 2px 8px; border-radius: 20px; background: var(--info-bg); color: var(--info-text);
}
textarea {
  width: 100%; min-height: 170px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 8px 10px; font-family: var(--mono); font-size: 13px; line-height: 1.6;
  resize: vertical; background: var(--surface2); color: var(--text);
}
textarea:focus { outline: none; border-color: var(--border2); }

/* field hint box */
.field-hint {
  margin-top: 8px; padding: 8px 10px; border-radius: var(--radius-sm);
  background: var(--info-bg); border: 1px solid var(--info-border);
  font-size: 12px; color: var(--info-text); line-height: 1.7;
}
.field-hint code { font-family: var(--mono); font-size: 12px; }

/* field card header row */
.field-card-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 7px; gap: 8px;
}
.field-card-header .card-label { margin-bottom: 0; }

/* trim button */
.btn-trim {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500;
  font-family: var(--sans); cursor: pointer; white-space: nowrap;
  background: var(--surface2); border: 1px solid var(--border2);
  color: var(--text2); transition: background 0.12s, color 0.12s, border-color 0.12s;
  letter-spacing: 0; text-transform: none;
}
.btn-trim:hover { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }
.btn-trim:active { opacity: 0.8; }

/* trim flash: textarea briefly highlights after trim */
@keyframes trim-flash {
  0%   { border-color: var(--ok-border); box-shadow: 0 0 0 2px rgba(110,212,160,0.25); }
  100% { border-color: var(--border);    box-shadow: none; }
}
.trim-flashed { animation: trim-flash 0.6s ease-out; }

/* ── Actions ── */
.actions { display: flex; gap: 8px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
.status-msg { font-size: 13px; }
.err { color: var(--danger-text); }

/* ── Banners ── */
.banner {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 9px 14px; margin-bottom: 10px;
  border-radius: var(--radius-sm); font-size: 13px;
}
.banner-icon { font-size: 15px; flex-shrink: 0; margin-top: 1px; }
.banner.warn   { background: var(--warn-bg);   border: 1px solid var(--warn-border);   color: var(--warn-text); }
.banner.danger { background: var(--danger-bg); border: 1px solid var(--danger-border); color: var(--danger-text); }

/* ── Result ── */
.result-wrap { display: none; }
.result-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.result-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 9px 1rem; border-bottom: 1px solid var(--border);
  background: var(--surface2); gap: 8px; flex-wrap: wrap;
}
.result-header-title { font-size: 11px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--text2); }

.summary-pills { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.pill {
  font-size: 12px; padding: 3px 10px; border-radius: 20px; font-weight: 500;
}
.pill-ok     { background: var(--ok-bg);     color: var(--ok-text);     border: 1px solid var(--ok-border); }
.pill-warn   { background: var(--warn-bg);   color: var(--warn-text);   border: 1px solid var(--warn-border); }
.pill-danger { background: var(--danger-bg); color: var(--danger-text); border: 1px solid var(--danger-border); }

/* ── Table ── */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
th {
  text-align: left; padding: 7px 12px;
  font-size: 11px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase;
  color: var(--text2); background: var(--surface2); border-bottom: 1px solid var(--border); white-space: nowrap;
}
td {
  padding: 6px 12px; border-bottom: 1px solid var(--border);
  color: var(--text); font-size: 12px; vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--surface2); }

/* Row states */
tr.row-short    td { background: rgba(255,180,40,0.07); }
tr.row-short:hover td { background: rgba(255,180,40,0.13); }
tr.row-fail     td { background: rgba(200,40,40,0.07); }
tr.row-fail:hover  td { background: rgba(200,40,40,0.12); }
tr.row-ok       td { background: rgba(30,180,100,0.05); }
tr.row-ok:hover    td { background: rgba(30,180,100,0.10); }

td.num       { font-family: var(--mono); color: var(--text2); }
td.name-cell { font-family: var(--sans); font-weight: 500; font-size: 13px; color: var(--text); }
td.val-cell  { font-family: var(--mono); word-break: break-all; }
td.exp-cell  { font-family: var(--mono); color: var(--text2); font-size: 12px; }
td.chk-cell  { white-space: nowrap; }

/* Inline badges */
.ibadge {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500;
  font-family: var(--sans); white-space: nowrap;
}
.ibadge-ok      { background: var(--ok-bg);     color: var(--ok-text);     border: 1px solid var(--ok-border); }
.ibadge-match   { background: var(--info-bg);   color: var(--info-text);   border: 1px solid var(--info-border); }
.ibadge-fail    { background: var(--danger-bg); color: var(--danger-text); border: 1px solid var(--danger-border); }
.ibadge-short   { background: var(--warn-bg);   color: var(--warn-text);   border: 1px solid var(--warn-border); }
.ibadge-none    { color: var(--text3); font-style: italic; font-family: var(--sans); font-size: 12px; }

/* Lock button */
.btn-lock {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500;
  font-family: var(--sans); cursor: pointer; white-space: nowrap;
  transition: background 0.12s, color 0.12s, border-color 0.12s;
  letter-spacing: 0; text-transform: none;
}
.btn-lock.unlocked {
  background: var(--surface2); border: 1px solid var(--border2); color: var(--text2);
}
.btn-lock.unlocked:hover { background: var(--warn-bg); color: var(--warn-text); border-color: var(--warn-border); }
.btn-lock.locked {
  background: var(--warn-bg); border: 1px solid var(--warn-border); color: var(--warn-text);
}
.btn-lock.locked:hover { background: var(--surface2); color: var(--text2); border-color: var(--border2); }
textarea.locked-field { background: var(--surface3) !important; color: var(--text3) !important; cursor: not-allowed; }

/* Remaining message row */

.tab-item-time.visible { display: flex; }

.col-seq  { width: 40px; }
.col-name { width: 130px; }
.col-ofs  { width: 80px; }
.col-len  { width: 68px; }
.col-exp  { width: 120px; }

}

/* ── Dialog ── */

}

}
.dialog-box h3 { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
.dialog-box p  { font-size: 13px; color: var(--text2); margin-bottom: 1.25rem; line-height: 1.55; }
.dialog-actions { display: flex; gap: 8px; justify-content: flex-end; }

/* ── Import/Export modal ── */
.ie-modal-bg {

}
.ie-modal {
  background: var(--surface); border: 1px solid var(--border2);

}
.ie-modal h3 { font-size: 16px; font-weight: 600; }

.ie-tab-bar  { display: flex; gap: 0; border-bottom: 1px solid var(--border); }
.ie-tab {

  color: var(--text2); border-bottom: 2px solid transparent; margin-bottom: -1px;

}
.ie-tab.active { color: var(--text); border-bottom-color: var(--accent); font-weight: 500; }
.ie-tab:hover  { color: var(--text); background: var(--surface2); }
.ie-body { flex: 1; overflow: hidden; display: flex; flex-direction: column; gap: 10px; min-height: 0; }
.ie-textarea {
  flex: 1; min-height: 220px; resize: none;
  font-family: var(--mono); font-size: 12px; line-height: 1.5;
  border: 1px solid var(--border); border-radius: var(--radius-sm);

}
.ie-textarea:focus { outline: none; border-color: var(--border2); }
.ie-info {

}
.ie-actions { display: flex; gap: 8px; justify-content: flex-end; flex-shrink: 0; }

}
.ie-drop-zone:hover, .ie-drop-zone.drag-over {

}
.ie-file-input { display: none; }

<body>
<div class="app">

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">TCP/IP 전문 파서</div>
      <div class="sidebar-sub">우클릭 → 복제</div>
    </div>
    <div class="sidebar-tabs" id="sidebar-tabs"></div>
    <div class="sidebar-footer">
      <button class="sidebar-add-btn" onclick="addTab()">
        <span style="font-size:16px;line-height:1">+</span> 새 탭 추가
      </button>
      <div class="sidebar-group-btns">
        <button class="sidebar-group-btn" onclick="collapseAllGroups()">▾ 전체 접기</button>
        <button class="sidebar-group-btn" onclick="expandAllGroups()">▸ 전체 열기</button>
      </div>
    </div>

  </div>

  <!-- Main -->
  <div class="main">
    <div class="main-inner">
      <div class="top-bar">
        <div class="top-bar-left"><h1 id="main-title">전문 파서</h1></div>
        <div class="top-bar-right">
          <button onclick="openIEModal('export')">내보내기</button>
          <button onclick="openIEModal('import')">가져오기</button>
          <button class="btn-danger" onclick="confirmResetDB()">DB 초기화</button>
        </div>
      </div>
      <div id="tab-panel"></div>
    </div>
  </div>
</div>

<div class="db-toast" id="db-toast"></div>

<script>
/* ══════════════════════════════════
   IndexedDB
══════════════════════════════════ */
const DB_NAME='tcpParser', DB_VER=1, STORE='tabs';
let db=null;
function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(DB_NAME,DB_VER);
    r.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains(STORE))
        d.createObjectStore(STORE,{keyPath:'id'}).createIndex('order','order',{unique:false});
    };
    r.onsuccess=e=>{db=e.target.result;res(db);};
    r.onerror  =e=>rej(e.target.error);
  });
}
const dbPut  =r =>new Promise((res,rej)=>{const t=db.transaction(STORE,'readwrite');t.objectStore(STORE).put(r);   t.oncomplete=res;t.onerror=e=>rej(e.target.error);});
const dbDel  =id=>new Promise((res,rej)=>{const t=db.transaction(STORE,'readwrite');t.objectStore(STORE).delete(id);t.oncomplete=res;t.onerror=e=>rej(e.target.error);});
const dbAll  =() =>new Promise((res,rej)=>{const r=db.transaction(STORE,'readonly').objectStore(STORE).index('order').getAll();r.onsuccess=e=>res(e.target.result);r.onerror=e=>rej(e.target.error);});
const dbClear=() =>new Promise((res,rej)=>{const t=db.transaction(STORE,'readwrite');t.objectStore(STORE).clear();   t.oncomplete=res;t.onerror=e=>rej(e.target.error);});

/* ══════════════════════════════════
   State
══════════════════════════════════ */
let tabs=[], activeId=null, tabOrder=0;
const genId=()=>'t'+Date.now()+Math.random().toString(36).slice(2,6);
function newTabData(ov){
  return Object.assign({
    id:genId(), order:tabOrder++, label:'전문 '+(tabs.length+1),
    desc:'', enc:'euc-kr', fields:'', raw:'', parsed:null,
    group:'', groupColor:'', updatedAt:Date.now(), savedAt:null, fieldsLocked:false
  },ov||{});
}

/* ══════════════════════════════════
   Toast
══════════════════════════════════ */
let toastT=null;
function showToast(msg){
  const el=document.getElementById('db-toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2200);
}

/* ══════════════════════════════════
   Helpers
══════════════════════════════════ */
const getTab=id=>tabs.find(t=>t.id===id);
const escH  =s =>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function getByteLen(str,enc){
  let b=0;
  for(let i=0;i<str.length;i++){
    const c=str.charCodeAt(i);
    b+=enc==='utf-8'?(c<0x80?1:c<0x800?2:c<0x10000?3:4):(c>0x7F?2:1);
  }
  return b;
}
function sliceBytes(str,start,len,enc){
  let pos=0,cs=-1,ce=str.length;
  for(let i=0;i<str.length;i++){
    if(pos===start)cs=i;
    if(cs!==-1&&pos-start>=len){ce=i;break;}
    const c=str.charCodeAt(i);
    pos+=enc==='utf-8'?(c<0x80?1:c<0x800?2:c<0x10000?3:4):(c>0x7F?2:1);
  }
  return cs===-1?'':str.substring(cs,ce);
}
function visualizeSpaces(str){
  if(!str)return'<span class="ibadge-none">—</span>';
  return Array.from(str).map(ch=>ch===' '?`<span class="space-vis">·</span>`:escH(ch)).join('');
}

/* ══════════════════════════════════
   Field definition parser
   문법:
     길이만          →  10
     이름:길이       →  거래코드:4
     이름:길이=고정  →  전문구분:2=01
     이름:길이=고정  공백 포함 고정값도 그대로 비교
══════════════════════════════════ */
function parseFieldDef(line, idx){
  // 이름:길이=고정값  또는  이름:길이  또는  길이
  // '=' 뒤 모두를 고정값으로 취급 (공백·한글 포함 가능)
  const eqPos = line.indexOf('=');
  const fixed = eqPos !== -1 ? line.substring(eqPos+1) : null; // null = 검증 없음
  const left  = eqPos !== -1 ? line.substring(0, eqPos) : line;

  let name, len;
  const colonPos = left.indexOf(':');
  if(colonPos !== -1){
    name = left.substring(0, colonPos).trim();
    len  = parseInt(left.substring(colonPos+1).trim(), 10);
  } else {
    len  = parseInt(left.trim(), 10);
    name = '필드'+(idx+1);
  }
  if(isNaN(len)||len<=0) return null;
  return {name, len, fixed}; // fixed: string | null
}

/* ══════════════════════════════════
   Sidebar render
══════════════════════════════════ */
const GROUP_COLORS=[
  '#e05c5c','#e0855c','#d4b84a','#6abf6a','#4aabca','#6a7de0','#b06ae0','#e06aab','#888888'
];

// 그룹 접힘 상태 (gname -> bool), localStorage 유지
const COLLAPSE_KEY='tcpParserGroupCollapse';
let groupCollapsed={};
try{ groupCollapsed=JSON.parse(localStorage.getItem(COLLAPSE_KEY)||'{}'); }catch(e){}
function saveCollapse(){ localStorage.setItem(COLLAPSE_KEY,JSON.stringify(groupCollapsed)); }

function fmtDate(ts){
  if(!ts) return '';
  const d=new Date(ts), now=new Date(), diff=now-d;
  if(diff<60000)     return '방금';
  if(diff<3600000)   return Math.floor(diff/60000)+'분 전';
  if(diff<86400000)  return Math.floor(diff/3600000)+'시간 전';
  if(diff<604800000) return Math.floor(diff/86400000)+'일 전';
  return `${d.getMonth()+1}/${d.getDate()}`;
}

function renderSidebar(){
  const container=document.getElementById('sidebar-tabs');
  container.innerHTML='';

  // 그룹별 묶기 (탭 order 유지)
  const grouped=new Map();
  const noGroup=[];
  tabs.forEach((tab,i)=>{
    if(tab.group){
      if(!grouped.has(tab.group)) grouped.set(tab.group,[]);
      grouped.get(tab.group).push({tab,i});
    } else {
      noGroup.push({tab,i});
    }
  });

  const sections=[];
  grouped.forEach((items,gname)=>{
    sections.push({gname, color:items[0].tab.groupColor||'#888', items});
  });
  if(noGroup.length) sections.push({gname:null, color:'', items:noGroup});

  sections.forEach(sec=>{
    if(sec.gname){
      const collapsed=!!groupCollapsed[sec.gname];

      // ── 그룹 헤더 ──
      const gh=document.createElement('div');
      gh.className='group-header'+(collapsed?' collapsed':'');
      gh.dataset.gname=sec.gname;

      const chev=document.createElement('span');
      chev.className='group-header-chevron';
      chev.textContent='▾';

      const dot=document.createElement('div');
      dot.className='group-header-dot';
      dot.style.background=sec.color;

      const lbl=document.createElement('div');
      lbl.className='group-header-label';
      lbl.textContent=sec.gname;

      const cnt=document.createElement('span');
      cnt.className='group-header-count';
      cnt.textContent=sec.items.length;

      const edit=document.createElement('button');
      edit.className='group-header-edit';
      edit.innerHTML='✎'; edit.title='그룹 편집';
      edit.onclick=e=>{e.stopPropagation();openGroupPicker(sec.items[0].tab.id,sec.gname,sec.color);};

      gh.appendChild(chev); gh.appendChild(dot); gh.appendChild(lbl);
      gh.appendChild(cnt); gh.appendChild(edit);

      // 클릭 → 접기/펼치기
      gh.addEventListener('click',e=>{
        if(e.target===edit||edit.contains(e.target)) return;
        toggleGroupCollapse(sec.gname);
      });

      // 그룹 헤더에 드래그 오버 → drop-target
      gh.addEventListener('dragover',e=>{
        e.preventDefault(); e.stopPropagation();
        if(!dragSrcId) return;
        e.dataTransfer.dropEffect='move';
        clearAllDropTargets();
        gh.classList.add('drop-target');
      });
      gh.addEventListener('dragleave',e=>{
        if(!gh.contains(e.relatedTarget)) gh.classList.remove('drop-target');
      });
      gh.addEventListener('drop',e=>{
        e.preventDefault(); e.stopPropagation();
        gh.classList.remove('drop-target');
        if(!dragSrcId) return;
        moveTabToGroup(dragSrcId, sec.gname, sec.color);
      });

      container.appendChild(gh);

      // ── 그룹 바디 ──
      const body=document.createElement('div');
      body.className='group-body'+(collapsed?' collapsed':'');
      // max-height: 아이템 40px * 개수 + 여유
      body.style.maxHeight=collapsed?'0':(sec.items.length*40+8)+'px';
      sec.items.forEach(({tab,i})=> body.appendChild(buildTabItem(tab,i,sec.color)));
      container.appendChild(body);

    } else {
      // 그룹 없는 탭들 — 언그룹 존 드롭 영역
      const zone=document.createElement('div');
      zone.dataset.ungroup='1';
      zone.addEventListener('dragover',e=>{ e.preventDefault(); e.dataTransfer.dropEffect='move'; });
      sec.items.forEach(({tab,i})=> zone.appendChild(buildTabItem(tab,i,'')));
      container.appendChild(zone);
    }
  });

  // 빈 언그룹 존 (탭 전부 그룹에 있을 때도 드래그 드롭 타겟 필요)
  if(!noGroup.length){
    const zone=document.createElement('div');
    zone.dataset.ungroup='1'; zone.style.minHeight='8px';
    zone.addEventListener('dragover',e=>{ e.preventDefault(); e.dataTransfer.dropEffect='move'; });
    zone.addEventListener('drop',e=>{ e.preventDefault(); if(dragSrcId) moveTabToGroup(dragSrcId,'',''); });
    container.appendChild(zone);
  }
}

function toggleGroupCollapse(gname){
  groupCollapsed[gname]=!groupCollapsed[gname];
  saveCollapse();
  renderSidebar();
}

function collapseAllGroups(){
  tabs.forEach(t=>{ if(t.group) groupCollapsed[t.group]=true; });
  saveCollapse(); renderSidebar();
}
function expandAllGroups(){
  groupCollapsed={};
  saveCollapse(); renderSidebar();
}

function buildTabItem(tab, i, groupColor){
  const item=document.createElement('div');
  item.className='tab-item'+(tab.id===activeId?' active':'');
  item.dataset.id=tab.id;
  item.draggable=true;
  if(groupColor){
    item.dataset.groupColor=groupColor;
    item.style.setProperty('--gc', groupColor);
  }

  const handle=document.createElement('div');
  handle.className='tab-drag-handle';
  handle.innerHTML='⠿'; handle.title='드래그해서 순서/그룹 변경';
  handle.addEventListener('mousedown',e=>e.stopPropagation());
  handle.addEventListener('click',e=>e.stopPropagation());

  const icon=document.createElement('div');
  icon.className='tab-item-icon';
  icon.textContent=String(i+1);

  const body=document.createElement('div');
  body.className='tab-item-body';
  const lbl=document.createElement('div');
  lbl.className='tab-item-label';
  lbl.textContent=tab.desc||tab.label; lbl.title=lbl.textContent;

  body.appendChild(lbl);

  const cl=document.createElement('button');
  cl.className='tab-item-close'; cl.innerHTML='&times;'; cl.title='탭 닫기';
  cl.onclick=e=>{e.stopPropagation();closeTab(tab.id);};

  item.appendChild(handle); item.appendChild(icon); item.appendChild(body); item.appendChild(cl);
  item.addEventListener('click',()=>switchTab(tab.id));
  item.addEventListener('contextmenu',e=>{e.preventDefault();showCtxMenu(e,tab.id);});

  item.addEventListener('dragstart',e=>{
    dragSrcId=tab.id; item.classList.add('dragging');
    e.dataTransfer.effectAllowed='move';
    e.dataTransfer.setData('text/plain',tab.id);
  });
  item.addEventListener('dragend',()=>{
    item.classList.remove('dragging');
    clearDropIndicators(); clearAllDropTargets();
  });
  item.addEventListener('dragover',e=>{
    e.preventDefault();
    if(dragSrcId===tab.id) return;
    e.dataTransfer.dropEffect='move';
    clearDropIndicators();
    const rect=item.getBoundingClientRect(), mid=rect.top+rect.height/2;
    item.classList.add(e.clientY<mid?'drag-over-above':'drag-over-below');
  });
  item.addEventListener('dragleave',()=>clearDropIndicators());
  item.addEventListener('drop',e=>{
    e.preventDefault();
    if(dragSrcId===tab.id) return;
    const rect=item.getBoundingClientRect(), mid=rect.top+rect.height/2;
    reorderTabs(dragSrcId, tab.id, e.clientY<mid);
  });
  return item;
}

// 사이드바 전체 재렌더 없이 수정일자만 갱신
function refreshSidebarItem(id){
  // 사이드바 탭에는 수정일자를 표시하지 않으므로 레이블만 유지
  const tab=getTab(id); if(!tab) return;
  const lbl=document.querySelector(`.tab-item[data-id="${id}"] .tab-item-label`);
  if(lbl){ lbl.textContent=tab.desc||tab.label; lbl.title=lbl.textContent; }
}

function refreshTimePanel(id){
  const tab=getTab(id); if(!tab) return;
  const abs=document.getElementById('time-abs-'+id);
  const rel=document.getElementById('time-rel-'+id);
  const sabs=document.getElementById('time-sabs-'+id);
  const srel=document.getElementById('time-srel-'+id);
  const fmt=ts=>ts?new Date(ts).toLocaleString('ko-KR',{year:'2-digit',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}):'-';
  if(abs)  abs.textContent=fmt(tab.updatedAt);
  if(rel)  rel.textContent=fmtDate(tab.updatedAt)||'-';
  if(sabs) sabs.textContent=tab.savedAt?fmt(tab.savedAt):'미저장';
  if(srel) srel.textContent=tab.savedAt?fmtDate(tab.savedAt):'—';
}

/* drag state */
let dragSrcId=null;
function clearDropIndicators(){
  document.querySelectorAll('.tab-item').forEach(el=>{
    el.classList.remove('drag-over-above','drag-over-below');
  });
}
function clearAllDropTargets(){
  document.querySelectorAll('.group-header.drop-target').forEach(el=>el.classList.remove('drop-target'));
}

async function reorderTabs(srcId, targetId, before){
  clearDropIndicators();
  const srcIdx=tabs.findIndex(t=>t.id===srcId);
  const [moved]=tabs.splice(srcIdx,1);
  let tgtIdx=tabs.findIndex(t=>t.id===targetId);
  if(!before) tgtIdx++;
  tabs.splice(tgtIdx,0,moved);
  tabs.forEach((t,i)=>t.order=i);
  for(const t of tabs) await dbPut(serTab(t));
  renderSidebar();
  showToast('순서가 변경되었습니다.');
}

async function moveTabToGroup(srcId, gname, color){
  const tab=getTab(srcId); if(!tab) return;
  tab.group=gname||'';
  tab.groupColor=gname?color:'';
  tab.updatedAt=Date.now();
  await dbPut(serTab(tab));
  renderSidebar();
  showToast(gname?`"${gname}" 그룹으로 이동됐습니다.`:'그룹에서 해제됐습니다.');
}

/* ══════════════════════════════════
   Panel render
══════════════════════════════════ */
function renderPanel(){
  const container=document.getElementById('tab-panel');
  container.innerHTML='';
  const tab=getTab(activeId);
  if(!tab){
    const p=document.createElement('p');
    p.style.cssText='color:var(--text3);font-size:14px;padding:2rem 0';
    p.textContent='탭을 선택하세요.';
    container.appendChild(p);
    return;
  }
  document.getElementById('main-title').textContent=tab.desc||tab.label;

  /* ── 탭 메타 (설명 + 인코딩) ── */
  const meta=mk('div','tab-meta');

  const descInput=mk('input','tab-desc-input');
  descInput.type='text';
  descInput.placeholder='탭 설명 (예: 로그인 요청, 잔액조회 응답 …)';
  descInput.value=tab.desc;
  descInput.oninput=function(){ onDescInput(this,tab.id); };
  meta.appendChild(descInput);

  const encGroup=mk('div','enc-group');
  const encLbl=document.createElement('label'); encLbl.textContent='인코딩'; encGroup.appendChild(encLbl);

/* helper: createElement + className */
function mk(tag, cls){
  const el=document.createElement(tag||'div');
  if(cls) el.className=cls;
  return el;
}

function render(){ renderSidebar(); renderPanel(); }

/* ══════════════════════════════════
   Context menu
══════════════════════════════════ */
let ctxMenu=null;
function showCtxMenu(e,tabId){
  removeCtxMenu();
  const menu=document.createElement('div');
  menu.className='ctx-menu';
  menu.style.left=e.clientX+'px';
  menu.style.top =e.clientY+'px';
  [
    {label:'📋  복제',       action:()=>duplicateTab(tabId)},
    {label:'🏷  그룹 지정', action:()=>openGroupPicker(tabId)},
    {sep:true},
    {label:'✕  탭 닫기',   cls:'danger', action:()=>closeTab(tabId)},
  ].forEach(it=>{
    if(it.sep){const s=document.createElement('div');s.className='ctx-sep';menu.appendChild(s);return;}
    const d=document.createElement('div');
    d.className='ctx-item'+(it.cls?' '+it.cls:'');
    d.textContent=it.label;
    d.onclick=()=>{removeCtxMenu();it.action();};
    menu.appendChild(d);
  });
  document.body.appendChild(menu);
  ctxMenu=menu;
  const r=menu.getBoundingClientRect();
  if(r.right >window.innerWidth)  menu.style.left=(e.clientX-r.width)+'px';
  if(r.bottom>window.innerHeight) menu.style.top =(e.clientY-r.height)+'px';
}
function removeCtxMenu(){ if(ctxMenu){ctxMenu.remove();ctxMenu=null;} }
document.addEventListener('click',removeCtxMenu);
document.addEventListener('keydown',e=>{if(e.key==='Escape')removeCtxMenu();});

/* ══════════════════════════════════
   Tab CRUD
══════════════════════════════════ */
async function addTab(){
  const t=newTabData();tabs.push(t);activeId=t.id;
  await dbPut(serTab(t));render();showToast('새 탭이 추가되었습니다.');
}
function switchTab(id){activeId=id;render();}
async function closeTab(id){
  if(tabs.length===1){showToast('마지막 탭은 닫을 수 없습니다.');return;}
  const idx=tabs.findIndex(t=>t.id===id);
  tabs.splice(idx,1);await dbDel(id);
  if(activeId===id)activeId=tabs[Math.min(idx,tabs.length-1)].id;
  render();showToast('탭이 삭제되었습니다.');
}
async function duplicateTab(id){
  const src=getTab(id);if(!src)return;
  const t=newTabData({
    label:src.label+' (복사)', desc:src.desc?(src.desc+' (복사)'):'',
    enc:src.enc, fields:src.fields, raw:src.raw,
    parsed:src.parsed?JSON.parse(JSON.stringify(src.parsed)):null,
  });
  const idx=tabs.findIndex(t=>t.id===id);
  tabs.splice(idx+1,0,t);
  tabs.forEach((tab,i)=>{tab.order=i;});
  for(const tab of tabs)await dbPut(serTab(tab));
  activeId=t.id;render();showToast('탭이 복제되었습니다.');
}

/* ══════════════════════════════════
   Trim field spaces
   규칙: 각 줄에서
     - 이름 앞뒤 공백 제거
     - ':' 앞뒤 공백 제거
     - 길이(숫자) 앞뒤 공백 제거
     - '=' 앞뒤 공백 제거  (단, '=' 뒤 고정값은 그대로 유지)
   예) "  A  :  7  =  This is  " → "A:7=This is  "
══════════════════════════════════ */
async function trimFieldSpaces(id){
  const tab=getTab(id); if(!tab) return;
  const el=document.getElementById('fields-'+id);
  const raw=(el?el.value:tab.fields);

  const trimmed=raw.split('\n').map(line=>{
    // 줄 전체 앞뒤 공백은 제거
    const s=line.trimStart();
    if(!s) return '';

    const eqIdx=s.indexOf('=');
    const colonIdx=s.indexOf(':');

    if(colonIdx===-1 && eqIdx===-1){
      // 숫자만: 앞뒤 공백 제거
      return s.trim();
    }

    if(colonIdx!==-1){
      // 이름:길이  또는  이름:길이=고정값
      const namePart = s.substring(0, colonIdx).trim();

      if(eqIdx!==-1 && eqIdx>colonIdx){
        // 이름:길이=고정값
        const lenPart  = s.substring(colonIdx+1, eqIdx).trim();
        const fixedPart= s.substring(eqIdx+1); // 고정값은 앞 공백만 제거, 뒤는 보존
        // '=' 바로 뒤 공백은 제거하되, 그 이후 내용은 유지
        // 단, 고정값 자체가 공백으로 시작하는 경우는 유지해야 하므로
        // 사용자가 의도한 고정값을 보호하기 위해 앞뒤 모두 보존
        return `${namePart}:${lenPart}=${fixedPart}`;
      } else {
        // 이름:길이
        const lenPart = s.substring(colonIdx+1).trim();
        return `${namePart}:${lenPart}`;
      }
    } else {
      // ':' 없이 '='만 있는 경우 (비정상이지만 그대로 처리)
      return s.trim();
    }
  }).join('\n');

  if(trimmed===raw){
    showToast('정리할 공백이 없습니다.');
    return;
  }

  // DOM 업데이트
  if(el){
    el.value=trimmed;
    // 시각적 flash 효과
    el.classList.remove('trim-flashed');
    void el.offsetWidth; // reflow
    el.classList.add('trim-flashed');
    el.addEventListener('animationend',()=>el.classList.remove('trim-flashed'),{once:true});
  }

  // state + DB 저장
  tab.fields=trimmed;
  await dbPut(serTab(tab));
  showToast('공백이 정리되었습니다.');
}

/* ══════════════════════════════════
   Remove newlines from raw message
══════════════════════════════════ */
async function removeNewlines(id){
  const tab=getTab(id); if(!tab) return;
  const el=document.getElementById('raw-'+id);
  const current=el?el.value:tab.raw;

  // \r\n, \r, \n 모두 제거
  const cleaned=current.replace(/\r\n|\r|\n/g,'');

  if(cleaned===current){
    showToast('제거할 개행문자가 없습니다.');
    return;
  }

  if(el){
    el.value=cleaned;
    el.classList.remove('trim-flashed');
    void el.offsetWidth;
    el.classList.add('trim-flashed');
    el.addEventListener('animationend',()=>el.classList.remove('trim-flashed'),{once:true});
  }

  tab.raw=cleaned;
  await dbPut(serTab(tab));
  showToast('개행문자가 제거되었습니다.');
}

/* ══════════════════════════════════
   Parse
══════════════════════════════════ */
async function parseTab(id){
  const tab=getTab(id);if(!tab)return;
  const statusEl=document.getElementById('status-'+id);
  statusEl.innerHTML='';

  const fieldsTxt=(document.getElementById('fields-'+id)||{}).value??tab.fields;
  const raw      =(document.getElementById('raw-'   +id)||{}).value??tab.raw;

  if(!fieldsTxt.trim()){statusEl.innerHTML='<span class="err">필드 길이를 입력하세요.</span>';return;}
  if(!raw)             {statusEl.innerHTML='<span class="err">전문을 입력하세요.</span>';return;}

  // 줄 분리: = 이전(이름:길이) 부분만 trim, = 이후(고정값)는 원본 유지
  const lines=fieldsTxt.split('\n').map(s=>{
    if(!s.trim()) return '';
    const eq=s.indexOf('=');
    if(eq===-1) return s.trim();
    return s.substring(0,eq).trim()+'='+s.substring(eq+1);
  }).filter(Boolean);
  const fields=[];
  for(let i=0;i<lines.length;i++){
    const def=parseFieldDef(lines[i],i);
    if(!def){
      statusEl.innerHTML=`<span class="err">${i+1}번째 줄 오류: 유효하지 않음 → "${escH(lines[i])}"</span>`;
      return;
    }
    fields.push(def);
  }

  const enc=tab.enc, totalRaw=getByteLen(raw,enc), totalExp=fields.reduce((s,f)=>s+f.len,0);
  const rows=[]; let offset=0;
  fields.forEach((f,i)=>{
    const val      = sliceBytes(raw,offset,f.len,enc);
    const ab       = getByteLen(val,enc);
    // 전문이 짧아서 이 필드를 완전히 채우지 못한 경우
    const isShort  = ab < f.len;
    // 길이 검증: 실제 읽힌 바이트가 정의된 길이와 일치하는가
    const lenOk    = !isShort;
    // 고정값 검증: null=검증없음, isShort이면 판정 불가
    let fixedOk = null;
    if(f.fixed !== null && !isShort){
      fixedOk = (val === f.fixed);
    }
    rows.push({seq:i+1, name:f.name, offset, len:f.len, val, actualBytes:ab,
               isShort, lenOk, fixed:f.fixed, fixedOk});
    offset+=f.len;
  });

  const parsed={rows,totalRaw,totalExp,enc};
  tab.fields=fieldsTxt;tab.raw=raw;tab.parsed=parsed;
  tab.updatedAt=Date.now(); tab.savedAt=Date.now();
  await dbPut(serTab(tab));showToast('파싱 결과가 저장되었습니다.');
  refreshSidebarItem(tab.id); refreshTimePanel(tab.id);
  renderResult(id,parsed);
}

/* ══════════════════════════════════
   Render result
══════════════════════════════════ */
function renderResult(id,parsed){
  const wrap   =document.getElementById('result-'+id);  if(!wrap)return;
  const banners=document.getElementById('banners-'+id);
  const {rows,totalRaw,totalExp}=parsed;

  /* ── 배너 ── */
  let bannerHtml='';
  if(totalExp!==totalRaw){
    const diff=Math.abs(totalRaw-totalExp);
    const msg=totalExp<totalRaw
      ?`전문이 필드 합계보다 ${diff}Byte 깁니다 (전문 ${totalRaw}Byte / 필드합 ${totalExp}Byte) — 잘리지 않은 데이터가 남아 있을 수 있습니다.`
      :`전문이 필드 합계보다 ${diff}Byte 짧습니다 (전문 ${totalRaw}Byte / 필드합 ${totalExp}Byte) — 일부 필드 값이 부족합니다.`;
    bannerHtml+=`<div class="banner warn"><span class="banner-icon">⚠</span><span>${msg}</span></div>`;
  }
  const fixedFailCount=rows.filter(r=>r.fixedOk===false).length;
  if(fixedFailCount>0){
    bannerHtml+=`<div class="banner danger"><span class="banner-icon">✕</span><span>고정값 검증 실패: <strong>${fixedFailCount}개</strong> 필드가 예상 값과 다릅니다.</span></div>`;
  }
  if(banners) banners.innerHTML=bannerHtml;

  /* ── 헤더 요약 pills ── */
  const lenPill = totalExp===totalRaw
    ? `<span class="pill pill-ok">길이 일치 (${totalRaw}Byte)</span>`
    : totalExp<totalRaw
      ? `<span class="pill pill-warn">잔여 ${totalRaw-totalExp}Byte</span>`
      : `<span class="pill pill-warn">부족 ${totalExp-totalRaw}Byte</span>`;

  const fixedRows=rows.filter(r=>r.fixed!==null);
  let fixedPill='';
  if(fixedRows.length>0){
    const okCnt  =fixedRows.filter(r=>r.fixedOk===true).length;
    const failCnt=fixedRows.filter(r=>r.fixedOk===false).length;
    fixedPill = failCnt===0
      ? `<span class="pill pill-ok">고정값 ${okCnt}/${fixedRows.length} 일치</span>`
      : `<span class="pill pill-danger">고정값 불일치 ${failCnt}개</span>`;
  }

  /* ── 검증 컬럼 항상 표시 ── */
  const hasFixed=rows.some(r=>r.fixed!==null);

  const fieldRows=rows.map(r=>{
    let rowCls='';
    if(r.isShort)              rowCls='row-short';
    else if(r.fixedOk===false)  rowCls='row-fail';
    else if(r.fixedOk===true)   rowCls='row-ok';
    else                        rowCls='row-ok';

    const visVal=visualizeSpaces(r.val);
    const shortBadge=r.isShort?`<span class="ibadge ibadge-short">⚠ 부족 ${r.actualBytes}Byte/${r.len}Byte</span>`:'';

    const expCell=hasFixed
      ?(r.fixed!==null
          ?`<td class="exp-cell">${visualizeSpaces(r.fixed)}</td>`
          :`<td class="exp-cell"><span class="ibadge-none">—</span></td>`)
      :'';

    let chkContent='';
    if(r.isShort){
      chkContent=`<span class="ibadge ibadge-short">⚠ 길이 부족</span>`;
    } else if(r.fixed!==null){
      chkContent=r.fixedOk
        ?`<span class="ibadge ibadge-match">✓ 일치</span>`
        :`<span class="ibadge ibadge-fail">✕ 불일치</span>`;
    } else {
      chkContent=`<span class="ibadge ibadge-ok">✓ 길이 정상</span>`;
    }

    return `<tr${rowCls?' class="'+rowCls+'"':''}>
      <td class="num">${r.seq}</td>
      <td class="name-cell">${escH(r.name)}</td>
      <td class="num">${r.offset}</td>
      <td class="num">${r.len}Byte</td>
      <td class="val-cell">${visVal}${shortBadge}</td>
      ${expCell}<td class="chk-cell">${chkContent}</td>
    </tr>`;
  }).join('');

  /* ── 잔여 전문 행 ── */
  let remainRow='';
  if(totalRaw>totalExp){
    const remainVal=sliceBytes(parsed.rows.length>0?
      (document.getElementById('raw-'+id)||{value:''}).value||'':'',
      totalExp, totalRaw-totalExp, parsed.enc);
    // raw 값을 직접 가져오기 (tab state에서)
    const tab=getTab(id);
    const rawStr=tab?tab.raw:'';
    const remainStr=sliceBytes(rawStr, totalExp, totalRaw-totalExp, parsed.enc);
    const expCell2=hasFixed?`<td class="exp-cell"><span class="ibadge-none">—</span></td>`:'';
    remainRow=`<tr class="row-remain">
      <td class="num">—</td>
      <td class="name-cell">잔여 전문</td>
      <td class="num">${totalExp}</td>
      <td class="num">${totalRaw-totalExp}Byte</td>
      <td class="val-cell">${visualizeSpaces(remainStr)}</td>
      ${expCell2}<td class="chk-cell"><span class="ibadge ibadge-short">미파싱</span></td>
    </tr>`;
  }

  const fixedCols=hasFixed?`<col class="col-exp"><col class="col-chk">`:`<col class="col-chk">`;
  const fixedTh  =hasFixed?`<th>기대값</th><th>검증</th>`:`<th>검증</th>`;

  wrap.style.display='block';
  wrap.innerHTML=`
    <div class="result-card">
      <div class="result-header">
        <span class="result-header-title">파싱 결과</span>
        <div class="summary-pills">${lenPill}${fixedPill}</div>
      </div>
      <div class="table-wrap">
        <table>
          <colgroup>
            <col class="col-seq"><col class="col-name"><col class="col-ofs">
            <col class="col-len"><col>${fixedCols}
          </colgroup>
          <thead><tr>
            <th>#</th><th>필드명</th><th>오프셋</th><th>길이</th><th>값</th>
            ${fixedTh}
          </tr></thead>
          <tbody>${fieldRows}${remainRow}</tbody>
        </table>
      </div>
    </div>`;
}

/* ══════════════════════════════════
   Serialize
══════════════════════════════════ */
const serTab  =t=>({id:t.id,order:t.order,label:t.label,desc:t.desc,enc:t.enc,fields:t.fields,raw:t.raw,parsed:t.parsed,group:t.group||'',groupColor:t.groupColor||'',updatedAt:t.updatedAt||Date.now(),savedAt:t.savedAt||null,fieldsLocked:!!t.fieldsLocked});
const deserTab=r=>({id:r.id,order:r.order,label:r.label||'전문',desc:r.desc||'',enc:r.enc||'euc-kr',fields:r.fields||'',raw:r.raw||'',parsed:r.parsed||null,group:r.group||'',groupColor:r.groupColor||'',updatedAt:r.updatedAt||Date.now(),savedAt:r.savedAt||null,fieldsLocked:!!r.fieldsLocked});

/* ══════════════════════════════════
   Group picker
══════════════════════════════════ */
function openGroupPicker(tabId, prefillName, prefillColor){
  const tab=getTab(tabId); if(!tab) return;
  const initName  = prefillName  ?? tab.group      ?? '';
  const initColor = prefillColor ?? tab.groupColor ?? GROUP_COLORS[0];

  const bg=document.createElement('div'); bg.className='gpicker-bg';
  const swatchHtml=GROUP_COLORS.map(c=>
    `<div class="color-swatch${c===initColor?' selected':''}" data-c="${c}"
      style="background:${c}" title="${c}"></div>`
  ).join('');

  bg.innerHTML=`
    <div class="gpicker-box">
      <h3>그룹 지정</h3>
      <label>그룹 이름 (비워두면 그룹 해제)</label>
      <input type="text" id="gp-name" value="${escH(initName)}" placeholder="예: 로그인, 조회 API …" maxlength="30" />
      <label>그룹 색상</label>
      <div class="color-swatches" id="gp-swatches">${swatchHtml}</div>
      <div class="gpicker-actions">
        <button onclick="this.closest('.gpicker-bg').remove()">취소</button>
        <button class="btn-primary" onclick="saveGroup('${tabId}',this)">저장</button>
      </div>
    </div>`;

  bg.querySelector('#gp-swatches').addEventListener('click',e=>{
    const sw=e.target.closest('.color-swatch'); if(!sw) return;
    bg.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('selected'));
    sw.classList.add('selected');
  });
  document.body.appendChild(bg);
  bg.querySelector('#gp-name').focus();
}

async function saveGroup(tabId, btn){
  const bg=btn.closest('.gpicker-bg');
  const name =bg.querySelector('#gp-name').value.trim();
  const selSw=bg.querySelector('.color-swatch.selected');
  const color=selSw?selSw.dataset.c:GROUP_COLORS[0];

  // 같은 그룹명을 가진 다른 탭들도 색상 동기화
  const oldName=getTab(tabId)?.group||'';
  tabs.forEach(t=>{
    if(t.id===tabId){
      t.group=name; t.groupColor=name?color:'';
    } else if(name && t.group===oldName && oldName){
      // 같은 그룹이었던 탭들 색상 동기화
      t.groupColor=color;
    }
  });
  for(const t of tabs) await dbPut(serTab(t));
  bg.remove();
  renderSidebar();
  showToast(name?`"${name}" 그룹으로 지정됐습니다.`:'그룹이 해제됐습니다.');
}

/* ══════════════════════════════════
   Import / Export
══════════════════════════════════ */
const IE_VERSION = 1;

function buildExportData(){
  // 탭 전체 + 그룹 정보 포함 직렬화
  return {
    version:   IE_VERSION,
    exportedAt: new Date().toISOString(),
    tabs: tabs.map(t => serTab(t)),
  };
}

function openIEModal(mode){
  const bg = document.createElement('div');
  bg.className = 'ie-modal-bg';

  const modal = document.createElement('div');
  modal.className = 'ie-modal';

  // 탭바
  const tabBar = document.createElement('div');
  tabBar.className = 'ie-tab-bar';
  ['내보내기','가져오기'].forEach((lbl, i) => {
    const btn = document.createElement('button');
    btn.className = 'ie-tab' + ((mode==='export'&&i===0)||(mode==='import'&&i===1) ? ' active' : '');
    btn.textContent = lbl;
    btn.onclick = () => {
      tabBar.querySelectorAll('.ie-tab').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      renderIEBody(i===0?'export':'import');
    };
    tabBar.appendChild(btn);
  });

  const body = document.createElement('div');
  body.className = 'ie-body';
  body.id = 'ie-body';

  const footer = document.createElement('div');
  footer.className = 'ie-actions';
  const closeBtn = document.createElement('button');
  closeBtn.textContent = '닫기';
  closeBtn.onclick = () => bg.remove();
  footer.appendChild(closeBtn);

  modal.appendChild(tabBar);
  modal.appendChild(body);
  modal.appendChild(footer);
  bg.appendChild(modal);
  document.body.appendChild(bg);

  // Esc 닫기
  bg.addEventListener('click', e => { if(e.target===bg) bg.remove(); });

  function renderIEBody(m){
    body.innerHTML = '';

    if(m === 'export'){
      const json = JSON.stringify(buildExportData(), null, 2);

      const info = document.createElement('div');
      info.className = 'ie-info';
      info.textContent = `전체 ${tabs.length}개 탭 · 그룹 정보 포함 · JSON 형식`;
      body.appendChild(info);

      const ta = document.createElement('textarea');
      ta.className = 'ie-textarea';
      ta.readOnly = true;
      ta.value = json;
      ta.onclick = () => { ta.select(); };
      body.appendChild(ta);

      const btnRow = document.createElement('div');
      btnRow.style.cssText = 'display:flex;gap:8px;';

      const copyBtn = document.createElement('button');
      copyBtn.textContent = '클립보드 복사';
      copyBtn.onclick = () => {
        navigator.clipboard.writeText(json).then(()=>showToast('클립보드에 복사됐습니다.')).catch(()=>{
          ta.select(); document.execCommand('copy'); showToast('복사됐습니다.');
        });
      };

      const dlBtn = document.createElement('button');
      dlBtn.className = 'btn-primary';
      dlBtn.textContent = '파일로 저장 (.json)';
      dlBtn.onclick = () => {
        const blob = new Blob([json], {type:'application/json'});
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        const ts   = new Date().toISOString().slice(0,16).replace('T','_').replace(':','-');
        a.href = url; a.download = `tcp_parser_${ts}.json`;
        a.click(); URL.revokeObjectURL(url);
        showToast('파일이 저장됩니다.');
      };

      btnRow.appendChild(copyBtn);
      btnRow.appendChild(dlBtn);
      body.appendChild(btnRow);

    } else {
      // Import
      const info = document.createElement('div');
      info.className = 'ie-info';
      info.textContent = '기존 탭에 추가됩니다. 같은 ID가 있으면 덮어씁니다.';
      body.appendChild(info);

      // 드롭 존
      const dropZone = document.createElement('div');
      dropZone.className = 'ie-drop-zone';
      dropZone.innerHTML = '파일을 여기에 드래그하거나 클릭해서 선택<br><small style="opacity:0.6">(.json)</small>';
      const fileInput = document.createElement('input');
      fileInput.type = 'file'; fileInput.accept = '.json,application/json';
      fileInput.className = 'ie-file-input';
      fileInput.onchange = e => {
        const file = e.target.files[0]; if(!file) return;
        readFile(file);
      };
      dropZone.onclick = () => fileInput.click();
      dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
      dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
      dropZone.addEventListener('drop', e => {
        e.preventDefault(); dropZone.classList.remove('drag-over');
        const file = e.dataTransfer.files[0]; if(!file) return;
        readFile(file);
      });
      body.appendChild(dropZone);
      body.appendChild(fileInput);

      // 직접 붙여넣기
      const orLbl = document.createElement('div');
      orLbl.style.cssText = 'font-size:12px;color:var(--text3);text-align:center;';
      orLbl.textContent = '또는 JSON 직접 붙여넣기';
      body.appendChild(orLbl);

      const ta = document.createElement('textarea');
      ta.className = 'ie-textarea';
      ta.placeholder = '{"version":1,"tabs":[...]} 형식의 JSON';
      ta.style.minHeight = '120px';
      body.appendChild(ta);

      const importBtn = document.createElement('button');
      importBtn.className = 'btn-primary';
      importBtn.textContent = '가져오기 실행';
      importBtn.onclick = () => {
        const src = ta.value.trim();
        if(!src){ showToast('JSON을 입력하세요.'); return; }
        doImport(src, bg);
      };
      body.appendChild(importBtn);

      function readFile(file){
        const reader = new FileReader();
        reader.onload = e => { ta.value = e.target.result; };
        reader.readAsText(file, 'utf-8');
      }
    }
  }

  renderIEBody(mode);
}

async function doImport(jsonStr, modalBg){
  let data;
  try { data = JSON.parse(jsonStr); }
  catch(e){ showToast('JSON 파싱 오류: ' + e.message); return; }

  if(!data || !Array.isArray(data.tabs)){
    showToast('올바른 형식이 아닙니다. tabs 배열이 필요합니다.');
    return;
  }

  const imported = data.tabs.map(r => deserTab(r));
  let added = 0, updated = 0;

  for(const t of imported){
    const existing = getTab(t.id);
    if(existing){
      // 덮어쓰기
      Object.assign(existing, t);
      updated++;
    } else {
      // order 충돌 방지
      t.order = tabOrder++;
      tabs.push(t);
      added++;
    }
    await dbPut(serTab(t));
  }

  // order 재정렬
  tabs.sort((a,b) => a.order - b.order);
  tabs.forEach((t,i) => t.order = i);
  tabOrder = tabs.length;
  for(const t of tabs) await dbPut(serTab(t));

  if(!activeId || !getTab(activeId)) activeId = tabs[0]?.id || null;

  if(modalBg) modalBg.remove();
  render();
  showToast(`가져오기 완료 — 추가 ${added}개, 업데이트 ${updated}개`);
}

/* ══════════════════════════════════
   DB Reset
══════════════════════════════════ */
function confirmResetDB(){
  const bg=document.createElement('div');bg.className='dialog-bg';
  bg.innerHTML=`
    <div class="dialog-box">
      <h3>DB 초기화</h3>
      <p>저장된 모든 탭과 데이터가 삭제됩니다.<br>이 작업은 되돌릴 수 없습니다.</p>
      <div class="dialog-actions">
        <button onclick="this.closest('.dialog-bg').remove()">취소</button>
        <button class="btn-danger" onclick="resetDB();this.closest('.dialog-bg').remove()">초기화</button>
      </div>
    </div>`;
  document.body.appendChild(bg);
}
async function resetDB(){
  await dbClear();tabs=[];activeId=null;tabOrder=0;
  const t=newTabData();tabs.push(t);activeId=t.id;
  await dbPut(serTab(t));render();showToast('DB가 초기화되었습니다.');
}

/* ══════════════════════════════════
   Sidebar resize
══════════════════════════════════ */
(function(){
  const sidebar=document.getElementById('sidebar');
  const handle =document.getElementById('resize-handle');
  const KEY    ='tcpParserSidebarW';
  const saved  =localStorage.getItem(KEY);
  if(saved){const w=parseInt(saved,10);if(w>=140&&w<=420)sidebar.style.width=w+'px';}
  let dragging=false,startX=0,startW=0;
  handle.addEventListener('mousedown',e=>{
    dragging=true;startX=e.clientX;startW=sidebar.offsetWidth;
    handle.classList.add('dragging');
    document.body.style.cursor='col-resize';document.body.style.userSelect='none';
    e.preventDefault();
  });
  document.addEventListener('mousemove',e=>{
    if(!dragging)return;
    sidebar.style.width=Math.min(420,Math.max(140,startW+(e.clientX-startX)))+'px';
  });
  document.addEventListener('mouseup',()=>{
    if(!dragging)return;
    dragging=false;handle.classList.remove('dragging');
    document.body.style.cursor='';document.body.style.userSelect='';
    localStorage.setItem(KEY,sidebar.offsetWidth);
  });
})();

/* ══════════════════════════════════
   Keyboard
══════════════════════════════════ */
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='Enter'&&activeId)parseTab(activeId);
});

/* ══════════════════════════════════
   Init
══════════════════════════════════ */
openDB().then(async()=>{
  const records=await dbAll();
  if(records.length>0){
    records.sort((a,b)=>a.order-b.order);
    tabs=records.map(deserTab);
    tabOrder=Math.max(...tabs.map(t=>t.order))+1;
    activeId=tabs[0].id;
  } else {
    const t=newTabData();tabs.push(t);activeId=t.id;await dbPut(serTab(t));
  }
  render();
}).catch(err=>{
  console.error('IndexedDB 오류:',err);
  const t=newTabData();tabs.push(t);activeId=t.id;render();
});
</script>
